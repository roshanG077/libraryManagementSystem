<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Member - LibraryOS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="blob-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Top Navbar -->
    <nav class="top-navbar">
        <div class="nav-container container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-layer-group"></i> LibraryOS
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
                <a href="addform.html" class="nav-link"><i class="fas fa-book"></i> Books</a>
                <a href="addmember.html" class="nav-link active"><i class="fas fa-users"></i> Members</a>
                <a href="issued_books.html" class="nav-link"><i class="fas fa-exchange-alt"></i> Issued Books</a>
            </div>
        </div>
    </nav>

    <div class="container max-w-480 mt-4 mb-4">
        <div class="lib-card p-1">
            <div class="text-center mb-2">
                <div class="stat-orb orb-green m-auto">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1 class="text-section">Register Member</h1>
                <p class="text-muted">Fill in the details to register a new library member</p>
            </div>

            <form action="addmember" method="post">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="lib-input" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="lib-input" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="lib-input" pattern="[0-9]{10,15}" title="Enter 10–15 digit phone number" required>
                </div>

                <div class="flex gap-1 mt-2">
                    <button type="submit" class="lib-btn lib-btn-primary flex-1">Register Member</button>
                    <a href="index.html" class="lib-btn lib-btn-secondary flex-1">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
